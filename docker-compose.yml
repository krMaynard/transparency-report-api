services:
  web:
    build: .
    ports:
      - "8000:8080"           # host 8000 → container $PORT (8080)
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    # The image seeds demo.db at build time — no host volume / pre-seed needed.
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
