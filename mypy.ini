[mypy]
python_version = 3.11
# Catch bugs inside functions that lack a return/param annotation too.
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
# The smoke-test suite (test_api.py) uses duck-typed fakes by design; type-check
# the application + its fixtures, not the tests.
files = main.py, seed.py, demo.py, conftest.py

# Third-party deps that don't ship type stubs — scope the missing-import
# suppression to just these so a typo'd import of our own code still errors.
[mypy-anthropic.*,redis.*,upstash_redis.*,prometheus_client.*,google.*]
ignore_missing_imports = True
