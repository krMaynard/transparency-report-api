[mypy]
python_version = 3.11
# Third-party deps (anthropic, redis, upstash_redis, prometheus_client, google.*)
# don't all ship type stubs; we type-check our own code, not theirs.
ignore_missing_imports = True
# Catch bugs inside functions that lack a return/param annotation too.
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
# The smoke-test suite (test_api.py) uses duck-typed fakes by design; type-check
# the application + its fixtures, not the tests.
files = main.py, seed.py, demo.py, conftest.py
