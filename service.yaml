# Cloud Run service manifest (Knative) for the DSA VLOP Transparency Query API.
# Deploy with:  gcloud run services replace service.yaml --region REGION
# Replace the PROJECT_ID / REGION / image tag and the auth env values first, and
# create the referenced secrets (see README → "Deploy to Cloud Run").
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: api-demo
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "4"
    spec:
      containerConcurrency: 40
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/api-demo/api-demo:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            # ── Auth ────────────────────────────────────────────────────────
            - name: ALLOW_DEMO_KEYS          # production: Google sign-in only
              value: "0"
            - name: GOOGLE_CLIENT_ID         # OAuth 2.0 Web client ID
              value: "REPLACE_WITH_OAUTH_WEB_CLIENT_ID.apps.googleusercontent.com"
            - name: ADMIN_EMAILS             # comma-separated admin allowlist
              value: "you@example.com"
            # ── Runtime ─────────────────────────────────────────────────────
            - name: LOG_FORMAT
              value: "json"
            - name: PUBLIC_BASE_URL          # absolute links in callbacks/downloads
              value: "https://REPLACE_WITH_SERVICE_URL.run.app"
            # Lock browser CORS to your frontend origin(s); omit if same-origin only.
            # - name: ALLOWED_ORIGINS
            #   value: "https://app.example.com"
            # ── Secrets (Secret Manager) ────────────────────────────────────
            - name: DOWNLOAD_URL_SECRET      # stable HMAC secret for signed URLs
              valueFrom:
                secretKeyRef:
                  name: api-demo-download-secret
                  key: latest
            # Persistent, cross-instance job/session/registration store. Omit to
            # fall back to per-instance in-memory (fine for a single instance).
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: api-demo-redis-url
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          # DB is seeded into the image; /readyz confirms it opens before serving.
          startupProbe:
            httpGet:
              path: /readyz
              port: 8080
            failureThreshold: 10
            periodSeconds: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 3
