name: Deploy to Cloud Run

# Build the image and roll a new Cloud Run revision on every push to main.
# Keyless auth via Workload Identity Federation (no long-lived service-account
# keys). The job is a no-op until the repo is configured — see README →
# "Continuous deployment (GitHub Actions)" for the one-time setup.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Don't let two deploys race; let an in-flight one finish.
concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

jobs:
  deploy:
    # Skipped (not failed) until GCP_PROJECT_ID is set as a repository variable.
    if: ${{ vars.GCP_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # required for Workload Identity Federation
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'api-demo' }}
      REPO: ${{ vars.ARTIFACT_REPO || 'api-demo' }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image (Cloud Build)
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/api-demo"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          # Immutable, traceable tag = the commit SHA; also move :latest.
          gcloud builds submit --quiet --tag "${IMAGE}:${GITHUB_SHA}" .
          gcloud artifacts docker tags add "${IMAGE}:${GITHUB_SHA}" "${IMAGE}:latest" --quiet

      - name: Deploy to Cloud Run
        # Rolls a new revision with this image, preserving the service's existing
        # env/secrets/scaling (set once via service.yaml). Set the DEPLOY repo
        # variable to "false" to build & push only, without deploying.
        if: ${{ vars.DEPLOY != 'false' }}
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}:${GITHUB_SHA}" \
            --region "${REGION}" \
            --quiet
