name: Deploy to Cloud Run

# Build the image and roll a new Cloud Run revision on every push to main.
# Keyless auth via Workload Identity Federation (no long-lived service-account
# keys). The job is a no-op until the repo is configured — see README →
# "Continuous deployment (GitHub Actions)" for the one-time setup.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Don't let two deploys race; let an in-flight one finish.
concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

jobs:
  deploy:
    # Skipped (not failed) until GCP_PROJECT_ID is set as a repository variable.
    if: ${{ vars.GCP_PROJECT_ID != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # required for Workload Identity Federation
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'us-central1' }}
      SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'research-api' }}
      REPO: ${{ vars.ARTIFACT_REPO || 'research-api' }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image (Cloud Build)
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/research-api"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          # Immutable, traceable tag = the commit SHA; also move :latest.
          # Regional, project-owned logs bucket — the global default logs bucket
          # isn't usable on this project, which fails `builds submit` otherwise.
          gcloud builds submit --quiet --tag "${IMAGE}:${GITHUB_SHA}" \
            --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET .
          gcloud artifacts docker tags add "${IMAGE}:${GITHUB_SHA}" "${IMAGE}:latest" --quiet

      - name: Deploy new revision (no traffic)
        # Roll a new revision but hold traffic on the current one, so we can probe
        # the new revision before promoting it. Preserves the service's existing
        # env/secrets/scaling (set once via service.yaml) and stamps APP_VERSION
        # with the commit SHA (surfaced at /version + the X-Version header).
        # Set the DEPLOY repo variable to "false" to build & push only.
        if: ${{ vars.DEPLOY != 'false' }}
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}:${GITHUB_SHA}" \
            --region "${REGION}" --project "${PROJECT_ID}" \
            --update-env-vars "APP_VERSION=${GITHUB_SHA}" \
            --tag candidate --no-traffic --quiet

      - name: Smoke-test the new revision
        # Probe the candidate revision's own URL (0% production traffic yet). If
        # /readyz doesn't come up, the job fails here and traffic is never moved.
        # Assumes a public service (README default); for an IAM-gated service add
        # an identity-token Authorization header.
        if: ${{ vars.DEPLOY != 'false' }}
        run: |
          # `describe` doesn't take --filter; filter the traffic list in the
          # format projection instead, then normalize gcloud's list rendering.
          URL=$(gcloud run services describe "${SERVICE}" \
            --region "${REGION}" --project "${PROJECT_ID}" \
            --format='value(status.traffic.filter("tag:candidate").extract(url))')
          URL="${URL//[\[\]\' ]/}"
          echo "Probing ${URL}/readyz"
          curl --fail --silent --show-error --retry 10 --retry-all-errors --retry-delay 3 "${URL}/readyz"

      - name: Route traffic to the new revision
        if: ${{ vars.DEPLOY != 'false' }}
        run: |
          gcloud run services update-traffic "${SERVICE}" \
            --region "${REGION}" --project "${PROJECT_ID}" \
            --to-latest --quiet

      - name: Enable LLM "Ask" from the ANTHROPIC_API_KEY repo secret
        # Syncs the GitHub repo secret into Secret Manager and binds it on the
        # service so POST /api/ask is enabled. No-ops cleanly if the secret isn't
        # set. The deployer SA needs to add secret versions
        # (roles/secretmanager.secretVersionAdder) + run.developer; pre-create the
        # secret and grant the runtime SA roles/secretmanager.secretAccessor once
        # if you'd rather not grant the deployer roles/secretmanager.admin.
        if: ${{ vars.DEPLOY != 'false' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WIF_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY repo secret not set — leaving /api/ask disabled."
            exit 0
          fi
          SECRET=research-api-anthropic-key
          gcloud secrets describe "$SECRET" --project "$PROJECT_ID" >/dev/null 2>&1 \
            || gcloud secrets create "$SECRET" --replication-policy=automatic --project "$PROJECT_ID"
          printf '%s' "$ANTHROPIC_API_KEY" \
            | gcloud secrets versions add "$SECRET" --data-file=- --project "$PROJECT_ID"
          # Project number for the runtime (Compute default) SA, parsed from the
          # WIF provider var — avoids gcloud projects describe, which needs the
          # Cloud Resource Manager API (not enabled for the deployer SA).
          PROJNUM="$(printf '%s' "$WIF_PROVIDER" | cut -d/ -f2)"
          gcloud secrets add-iam-policy-binding "$SECRET" \
            --member="serviceAccount:${PROJNUM}-compute@developer.gserviceaccount.com" \
            --role=roles/secretmanager.secretAccessor --project "$PROJECT_ID" >/dev/null || true
          gcloud run services update "$SERVICE" \
            --region "$REGION" --project "$PROJECT_ID" \
            --update-secrets "ANTHROPIC_API_KEY=${SECRET}:latest" --quiet
